server {
  listen 80;
  listen [::]:80;
  server_name guinee.career.selys.app;

  # ACME challenge pour Let's Encrypt
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    # Avant l'obtention du certificat : commenter la ligne ci-dessous et décommenter proxy_pass
    return 301 https://$host$request_uri;
    # proxy_pass http://app:3222;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name guinee.career.selys.app;

  ssl_certificate     /etc/letsencrypt/live/guinee.career.selys.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/guinee.career.selys.app/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;

  location / {
    proxy_pass http://app:3222;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
